<div class="detail-container">
  <div class="detail-glass-card">
    <header class="detail-header">
      <!-- ფუნქციის გამოძახება click-ზე -->
      <button (click)="backToHome()" class="back-btn">
        <i class="fas fa-arrow-left"></i> Back to Home
      </button>
      <h2>Hourly Forecast</h2>
    </header>

    <!-- საათობრივი პროგნოზის სია -->
    <div class="hourly-scroll" *ngIf="newObjData && newObjData.length > 0">
      <div class="hourly-item" *ngFor="let hour of newObjData">
        <p class="time">{{ hour.dt_txt.split(' ')[1].substring(0, 5) }}</p>
        
        <!-- Weather Icon -->
        <img [src]="'https://openweathermap.org/img/wn/' + (hour.weather[0]?.icon || '01d') + '@2x.png'" alt="weather">
        
        <p class="temp">{{ hour.main.temp | number:'1.0-0' }}°C</p>
        <p class="desc">{{ hour.weather[0]?.description }}</p>
        
        <div class="extra-info">
          <span><i class="fas fa-tint"></i> {{ hour.main.humidity }}%</span>
          <span><i class="fas fa-wind"></i> {{ hour.wind.speed }}m/s</span>
        </div>
      </div>
    </div>

    <!-- შეტყობინება თუ მონაცემები არ არის -->
    <div class="no-data" *ngIf="!newObjData || newObjData.length === 0">
      <p>No data selected. Redirecting to home...</p>
    </div>
  </div>
</div>
